<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0d12">
<title>Condor Watch</title>
<style>
:root {
  --bg:#0a0d12; --panel:#11161d; --raised:#161c25; --border:#232b36;
  --text:#e4e8ed; --dim:#8b96a5; --faint:#5a6472;
  --green:#3ddc84; --green-dim:#1f6b41; --red:#ff5d5d; --amber:#f5a623; --accent:#4d8eff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;margin:0;padding-bottom:env(safe-area-inset-bottom);}
#root{max-width:720px;margin:0 auto;padding:20px 16px 100px;}
h1{font-size:19px;font-weight:700;margin:0;letter-spacing:-.01em;}
h2{font-size:15px;font-weight:600;margin:0 0 14px;}
.mono{font-family:'SF Mono',Menlo,monospace;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
.empty{background:var(--panel);border:1px dashed var(--border);border-radius:14px;padding:40px 20px;text-align:center;}
.btn{border:none;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;padding:11px 18px;font-family:inherit;}
.btn-accent{background:var(--accent);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--dim);}
.btn-raised{background:var(--raised);border:1px solid var(--border);color:var(--text);width:100%;padding:12px;}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:7px;}
.btn-danger{background:rgba(255,93,93,0.12);border:1px solid var(--red);color:var(--red);}
label.fl{font-size:11px;color:var(--faint);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.04em;}
input,select{width:100%;background:var(--raised);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:14px;font-family:'SF Mono',monospace;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:11px;}
.sl{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;margin:14px 0 7px;}
.row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.row span:first-child{color:var(--dim);font-size:13px;}
.row span:last-child{font-size:13px;font-weight:600;}
.alert{border-radius:10px;padding:11px 13px;margin-bottom:8px;}
.alert-title{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.alert-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.alert-title strong{font-size:13px;}
.alert-detail{font-size:12px;color:var(--dim);line-height:1.5;}
.al-danger{background:rgba(255,93,93,.08);border:1px solid var(--red);}
.al-action{background:rgba(61,220,132,.08);border:1px solid var(--green);}
.al-warn{background:rgba(245,166,35,.08);border:1px solid var(--amber);}
.al-info{background:rgba(139,150,165,.08);border:1px solid var(--faint);}
.al-ok{background:rgba(61,220,132,.06);border:1px solid var(--green-dim);border-radius:10px;padding:11px 13px;font-size:13px;color:var(--dim);}
.gh-bar{font-size:11px;padding:6px 10px;border-radius:6px;margin-bottom:13px;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.gh-ok{background:rgba(61,220,132,.08);color:var(--green);}
.gh-off{background:rgba(139,150,165,.08);color:var(--faint);}
.gh-err{background:rgba(255,93,93,.08);color:var(--red);}
.gh-bar button{background:none;border:none;color:inherit;text-decoration:underline;cursor:pointer;font-size:11px;padding:0;}
.tr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:4px;}
.tr-stat{background:var(--raised);border-radius:10px;padding:11px;text-align:center;}
.tr-val{font-size:17px;font-weight:700;font-family:'SF Mono',monospace;}
.tr-label{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.03em;margin-top:3px;}
.leg-tabs{display:flex;gap:8px;margin-bottom:12px;}
.leg-tab{flex:1;padding:8px;border-radius:8px;border:1px solid var(--border);background:var(--raised);color:var(--dim);font-size:12px;font-weight:600;cursor:pointer;text-align:center;}
.leg-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.pos-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px;}
.cost-row{display:flex;gap:8px;align-items:center;}
.cost-row input{flex:1;}
details.rules{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:13px 17px;margin-bottom:13px;}
details.rules summary{cursor:pointer;font-size:13px;color:var(--dim);font-weight:600;}
.hist-item{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.filter-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.ftab{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--raised);color:var(--dim);font-size:11px;cursor:pointer;font-weight:600;}
.ftab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.err{color:var(--red);font-size:13px;margin-bottom:11px;}
.fa{display:flex;gap:9px;margin-top:13px;}
svg text{font-family:'SF Mono',monospace;}
</style>
</head>
<body>
<div id="root">Loading…</div>
<script>
// ── constants ──────────────────────────────────────────────────────────────
const PROX = 0.01; // 1% proximity trigger zone

// ── storage ───────────────────────────────────────────────────────────────
const SK = {
  positions: 'cw_positions',
  history:   'cw_history',
  gh:        'cw_gh',
  av:        'cw_av',
};

const ls = {
  get: k => { try { const r=localStorage.getItem(k); return r?JSON.parse(r):null; } catch(e){return null;} },
  set: (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch(e){} },
  del: k => { try { localStorage.removeItem(k); } catch(e){} },
};

function loadPositions(){ return ls.get(SK.positions) || []; }
function savePositions(a){ ls.set(SK.positions, a); }
function loadHistory(){ return ls.get(SK.history) || []; }
function saveHistory(h){ ls.set(SK.history, h); }
function loadGh(){ return ls.get(SK.gh) || {token:'',owner:'',repo:'',path:'data.json',branch:'main'}; }
function saveGh(c){ ls.set(SK.gh, c); }
function ghOk(c){ return !!(c.token && c.owner && c.repo); }
function loadAvKey(){ return localStorage.getItem(SK.av) || ''; }
function saveAvKey(k){ localStorage.setItem(SK.av, k); }

// ── github api ────────────────────────────────────────────────────────────
async function ghGet(cfg){
  const url=`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${encodeURIComponent(cfg.path)}?ref=${encodeURIComponent(cfg.branch)}`;
  const r=await fetch(url,{headers:{Authorization:`Bearer ${cfg.token}`,Accept:'application/vnd.github+json'}});
  if(r.status===404) return {content:null,sha:null};
  if(!r.ok) throw new Error(`GitHub GET ${r.status}`);
  const j=await r.json();
  return {content:JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))))),sha:j.sha};
}
async function ghPut(cfg,data,sha,msg){
  const url=`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${encodeURIComponent(cfg.path)}`;
  const body={message:msg||'Update condor watch data',content:btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2)))),branch:cfg.branch};
  if(sha) body.sha=sha;
  const r=await fetch(url,{method:'PUT',headers:{Authorization:`Bearer ${cfg.token}`,Accept:'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const t=await r.text().catch(()=>''); throw new Error(`GitHub PUT ${r.status}: ${t}`);}
  return (await r.json()).content.sha;
}
async function pushToGh(positions,history,msg){
  const cfg=state.gh;
  if(!ghOk(cfg)) return;
  setState({ghStatus:'syncing'});
  try{
    const {sha}=await ghGet(cfg);
    await ghPut(cfg,{positions,history,updatedAt:new Date().toISOString()},sha,msg);
    setState({ghStatus:'ok',ghError:''});
  }catch(e){ setState({ghStatus:'error',ghError:e.message}); }
}
async function initialSync(){
  const cfg=state.gh;
  if(!ghOk(cfg)) return;
  setState({ghStatus:'syncing'});
  try{
    const {content}=await ghGet(cfg);
    if(!content){
      // Nothing on GitHub — push local up
      const lp=loadPositions(), lh=loadHistory();
      if(lp.length>0||lh.length>0) await ghPut(cfg,{positions:lp,history:lh,updatedAt:new Date().toISOString()},null,'Initial sync');
      setState({ghStatus:'ok',ghError:''});
      startPolling();
      return;
    }
    // Pull from GitHub
    const positions = content.positions || (content.position ? [content.position] : []);
    const history = content.history || [];
    savePositions(positions);
    saveHistory(history);
    setState({positions,history,ghStatus:'ok',ghError:''});
    startPolling();
  }catch(e){ setState({ghStatus:'error',ghError:e.message}); }
}

// ── price fetch ───────────────────────────────────────────────────────────
async function fetchPrice(ticker,key){
  if(!key) return {price:null,error:'no-key'};
  try{
    const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(ticker)}&token=${encodeURIComponent(key)}`);
    if(r.status===401||r.status===403) return {price:null,error:'bad-key'};
    if(r.status===429) return {price:null,error:'rate-limit'};
    const j=await r.json();
    const price=(j&&typeof j.c==='number'&&j.c>0)?j.c:null;
    return price?{price,error:null}:{price:null,error:'empty'};
  }catch(e){ return {price:null,error:'network'}; }
}

// ── helpers ───────────────────────────────────────────────────────────────
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function fmtM(n){ const s=n<0?'-':''; return s+'$'+Math.abs(n).toFixed(2); }
function dte(dateStr){ const t=new Date(); t.setHours(0,0,0,0); return Math.round((new Date(dateStr+'T00:00:00')-t)/86400000); }
function pctDiff(a,b){ return (a-b)/b; }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ── rule engine (per-leg aware) ───────────────────────────────────────────
function evalPosition(pos, price){
  const alerts=[];
  const d=dte(pos.expiration);
  const hasPut = pos.shortPut && pos.longPut;
  const hasCall = pos.shortCall && pos.longCall;
  const isCondor = hasPut && hasCall;

  // Per-leg stop loss
  if(hasPut && pos.putCostToClose!==undefined && pos.putCostToClose!==''){
    const putPl = pos.putCredit - parseFloat(pos.putCostToClose);
    if(putPl <= -pos.putCredit){
      alerts.push({level:'danger',side:'put',
        title:'PUT STOP LOSS — close the put spread now',
        detail:`Put spread loss of ${fmtM(Math.abs(putPl))} has reached 1x put credit (${fmtM(pos.putCredit)}). Action: close the put spread (${pos.shortPut}/${pos.longPut}) immediately. Leave the call spread open if it's safely OTM.`});
    }
  }
  if(hasCall && pos.callCostToClose!==undefined && pos.callCostToClose!==''){
    const callPl = pos.callCredit - parseFloat(pos.callCostToClose);
    if(callPl <= -pos.callCredit){
      alerts.push({level:'danger',side:'call',
        title:'CALL STOP LOSS — close the call spread now',
        detail:`Call spread loss of ${fmtM(Math.abs(callPl))} has reached 1x call credit (${fmtM(pos.callCredit)}). Action: close the call spread (${pos.shortCall}/${pos.longCall}) immediately. Leave the put spread open if it's safely OTM.`});
    }
  }

  // Per-leg profit target (50%)
  if(hasPut && pos.putCostToClose!==undefined && pos.putCostToClose!==''){
    const putPl = pos.putCredit - parseFloat(pos.putCostToClose);
    if(putPl >= pos.putCredit*0.5 && putPl < pos.putCredit){
      alerts.push({level:'action',side:'put',
        title:'PUT PROFIT TARGET — consider closing put spread',
        detail:`Put spread P/L of ${fmtM(putPl)} has reached 50% of put credit (${fmtM(pos.putCredit*0.5)}). Action: close the put spread and lock in the gain. Let the call spread ride if still safely OTM.`});
    }
  }
  if(hasCall && pos.callCostToClose!==undefined && pos.callCostToClose!==''){
    const callPl = pos.callCredit - parseFloat(pos.callCostToClose);
    if(callPl >= pos.callCredit*0.5 && callPl < pos.callCredit){
      alerts.push({level:'action',side:'call',
        title:'CALL PROFIT TARGET — consider closing call spread',
        detail:`Call spread P/L of ${fmtM(callPl)} has reached 50% of call credit (${fmtM(pos.callCredit*0.5)}). Action: close the call spread and lock in the gain. Let the put spread ride if still safely OTM.`});
    }
  }

  // Whole position profit target
  if(pos.putCostToClose!==undefined && pos.putCostToClose!=='' && pos.callCostToClose!==undefined && pos.callCostToClose!==''){
    const totalPl = (pos.putCredit - parseFloat(pos.putCostToClose)) + (pos.callCredit - parseFloat(pos.callCostToClose));
    const totalCredit = pos.putCredit + pos.callCredit;
    if(totalPl >= totalCredit*0.5){
      alerts.push({level:'action',side:'both',
        title:'WHOLE POSITION PROFIT TARGET — close everything',
        detail:`Total P/L of ${fmtM(totalPl)} has reached 50% of total credit (${fmtM(totalCredit*0.5)}). Action: close both spreads and move on to the next trade.`});
    }
  }

  // Strike breach
  if(price && hasPut && price < pos.shortPut){
    alerts.push({level:'danger',side:'put',
      title:'PUT STRIKE BREACHED — close the put spread now',
      detail:`Price ($${price.toFixed(2)}) is below your short put ($${pos.shortPut}). Action: close the put spread immediately. Do not roll. Let the call spread ride if it's safely OTM.`});
  }
  if(price && hasCall && price > pos.shortCall){
    alerts.push({level:'danger',side:'call',
      title:'CALL STRIKE BREACHED — close the call spread now',
      detail:`Price ($${price.toFixed(2)}) is above your short call ($${pos.shortCall}). Action: close the call spread immediately. Do not roll. Let the put spread ride if it's safely OTM.`});
  }

  // Proximity (tested, not yet breached)
  if(price && d>=5){
    if(hasPut){ const pd=pctDiff(price,pos.shortPut); if(pd<=PROX&&pd>=0) alerts.push({level:'warn',side:'put',title:'Put side being tested — watch, no action yet',detail:`Price is ${(pd*100).toFixed(2)}% above short put ($${pos.shortPut}). Action: none yet. If price crosses $${pos.shortPut}, close put spread immediately.`}); }
    if(hasCall){ const cd=pctDiff(pos.shortCall,price); if(cd<=PROX&&cd>=0) alerts.push({level:'warn',side:'call',title:'Call side being tested — watch, no action yet',detail:`Price is ${(cd*100).toFixed(2)}% below short call ($${pos.shortCall}). Action: none yet. If price crosses $${pos.shortCall}, close call spread immediately.`}); }
  }

  // Final window
  if(d<=2&&d>=0) alerts.push({level:'warn',side:'both',title:`FINAL WINDOW — ${d} day${d===1?'':'s'} to expiration, close now`,detail:`Inside the final 2-day gamma window. Action: close the whole position today regardless of P/L. Don't hold into expiration.`});
  if(d<0) alerts.push({level:'info',side:'both',title:'Expiration has passed',detail:`Expired ${Math.abs(d)} day${Math.abs(d)===1?'':'s'} ago. Action: log the outcome and archive it.`});

  return {alerts, d};
}

// ── payoff chart ──────────────────────────────────────────────────────────
function chartSVG(pos, price){
  const w=660,h=200,px=20,pt=14,pb=22;
  const hasPut=pos.shortPut&&pos.longPut, hasCall=pos.shortCall&&pos.longCall;
  const putW=hasPut?pos.shortPut-pos.longPut:10;
  const callW=hasCall?pos.longCall-pos.shortCall:putW;
  const lo=hasPut?pos.longPut-putW*1.5:(pos.shortCall-callW*3);
  const hi=hasCall?pos.longCall+callW*1.5:(pos.shortPut+putW*3);
  const rng=hi-lo;
  const xf=p=>px+((p-lo)/rng)*(w-px*2);
  const totalCredit=(pos.putCredit||0)+(pos.callCredit||0);
  const maxProfit=totalCredit;
  const maxLoss=Math.max(putW,callW)-totalCredit;
  const y0=h*0.5, yP=pt+18, yL=h-pb-10;
  const yf=pl=>pl>=0?y0-(pl/Math.max(maxProfit,0.01))*(y0-yP):y0+(Math.abs(pl)/Math.max(maxLoss,0.01))*(yL-y0);

  const rShort=hasCall?pos.shortCall:(hasPut?pos.shortPut+putW*2:hi);
  const rLong=hasCall?pos.longCall:hi;
  const lShort=hasPut?pos.shortPut:lo;
  const lLong=hasPut?pos.longPut:lo;

  const pts=[[lo,-maxLoss],[lLong,-maxLoss],[lShort,maxProfit],[rShort,maxProfit],[rLong,-maxLoss],[hi,-maxLoss]];
  const pathD=pts.map((p,i)=>`${i===0?'M':'L'} ${xf(p[0])} ${yf(p[1])}`).join(' ');
  const priceX=price?xf(Math.max(lo,Math.min(hi,price))):null;

  function strike(s,color){
    if(!s) return '';
    const x=xf(s), zw=s*PROX, zx1=xf(s-zw), zx2=xf(s+zw);
    return `<rect x="${Math.min(zx1,zx2)}" y="${pt}" width="${Math.abs(zx2-zx1)}" height="${h-pt-pb}" fill="${color}" opacity="0.08"/>
    <line x1="${x}" y1="${pt}" x2="${x}" y2="${h-pb}" stroke="${color}" stroke-width="1" stroke-dasharray="2 2" opacity="0.6"/>
    <circle cx="${x}" cy="${pt+4}" r="2.5" fill="${color}"/>
    <text x="${x}" y="${h-6}" text-anchor="middle" fill="${color}" font-size="10" font-weight="600">$${s}</text>`;
  }
  function be(p){
    if(!p||p<lo||p>hi) return '';
    const x=xf(p),y=yf(0);
    return `<circle cx="${x}" cy="${y}" r="3" fill="var(--bg)" stroke="var(--dim)" stroke-width="1.5"/>`;
  }

  const putBE=hasPut?pos.shortPut-totalCredit:null;
  const callBE=hasCall?pos.shortCall+totalCredit:null;

  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block;">
    <line x1="${px}" y1="${y0}" x2="${w-px}" y2="${y0}" stroke="var(--border)" stroke-width="1"/>
    ${hasPut?strike(pos.shortPut,'var(--red)'):''}
    ${hasCall?strike(pos.shortCall,'var(--red)'):''}
    <path d="${pathD}" fill="none" stroke="var(--green)" stroke-width="2"/>
    ${be(putBE)}${be(callBE)}
    ${priceX!==null?`<line x1="${priceX}" y1="${pt}" x2="${priceX}" y2="${h-pb}" stroke="var(--accent)" stroke-width="1.5" stroke-dasharray="4 3"/><circle cx="${priceX}" cy="${pt-2}" r="3" fill="var(--accent)"/>`:''}
  </svg>
  <div style="display:flex;gap:12px;flex-wrap:wrap;font-size:10px;color:var(--faint);margin-top:5px;">
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:3px;"></span>Price</span>
    <span><span style="display:inline-block;width:10px;border-top:2px dashed var(--red);margin-right:3px;vertical-align:middle;"></span>Short strike</span>
    <span><span style="display:inline-block;width:10px;height:8px;background:var(--red);opacity:.25;margin-right:3px;vertical-align:middle;"></span>1% zone</span>
    <span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;border:1.5px solid var(--dim);margin-right:3px;vertical-align:middle;"></span>Breakeven</span>
  </div>`;
}

// ── track record stats ────────────────────────────────────────────────────
function trStats(history, filter){
  // filter: 'all' | 'put' | 'call' | 'condor' | 'put-only' | 'call-only'
  let legs=[];
  history.forEach(h=>{
    // Closed legs within a position
    (h.closedLegs||[]).forEach(l=>{
      legs.push({side:l.side, pl:l.pl, ticker:h.ticker});
    });
    // Final close P/L (whole position or remaining side)
    if(h.finalPl!==null && h.finalPl!==undefined && !(h.closedLegs||[]).length){
      // Simple whole-position close — attribute to 'condor' or 'put-only'/'call-only'
      const type = (h.shortPut&&h.shortCall)?'condor':(h.shortPut?'put-only':'call-only');
      legs.push({side:type, pl:h.finalPl, ticker:h.ticker});
    }
  });

  // Also gather per-side credits for put vs call breakdown
  const putLegs=[], callLegs=[];
  history.forEach(h=>{
    (h.closedLegs||[]).forEach(l=>{
      if(l.side==='put') putLegs.push(l.pl);
      if(l.side==='call') callLegs.push(l.pl);
    });
  });

  const filterLeg = l => {
    if(filter==='all') return true;
    if(filter==='put') return l.side==='put'||l.side==='put-only';
    if(filter==='call') return l.side==='call'||l.side==='call-only';
    if(filter==='condor') return l.side==='condor';
    return true;
  };

  const filtered = legs.filter(filterLeg);
  const n=filtered.length;
  const wins=filtered.filter(l=>l.pl>0).length;
  const totalPl=filtered.reduce((s,l)=>s+(l.pl||0),0);
  const avgPl=n>0?totalPl/n:null;
  const winRate=n>0?(wins/n)*100:null;
  return {n,wins,totalPl,avgPl,winRate,putLegs,callLegs};
}

// ── state ─────────────────────────────────────────────────────────────────
let state = {
  positions: loadPositions(),
  history:   loadHistory(),
  prices:    {},        // { ticker: { price, status } }
  gh:        loadGh(),
  ghStatus:  'idle',
  ghError:   '',
  avKey:     loadAvKey(),
  showSettings: false,
  showHistory:  false,
  histFilter:   'all',
  showForm:     false,
  editingId:    null,   // position id being edited/closed
  closeMode:    null,   // 'put' | 'call' | 'full'
  ui: {},               // per-position expanded state
};

function setState(patch){ state={...state,...patch}; render(); }

// ── polling ───────────────────────────────────────────────────────────────
let pollTimer=null;
async function refreshAllPrices(){
  const tickers=[...new Set(state.positions.map(p=>p.ticker))];
  const avKey=state.avKey;
  for(const t of tickers){
    const {price,error}=await fetchPrice(t,avKey);
    state.prices[t]=price?{price,status:'ok'}:{price:null,status:error||'fail'};
  }
  render();
}
function startPolling(){
  if(pollTimer) clearInterval(pollTimer);
  if(state.positions.length>0){
    refreshAllPrices();
    pollTimer=setInterval(refreshAllPrices, 30000);
  }
}

function saveNewPosition(form){
  const pos={
    id: uid(),
    ticker: form.ticker.toUpperCase(),
    expiration: form.expiration,
    contracts: parseInt(form.contracts)||1,
    openedAt: new Date().toISOString(),
    // Put side
    shortPut:   form.shortPut?parseFloat(form.shortPut):null,
    longPut:    form.longPut?parseFloat(form.longPut):null,
    putCredit:  form.putCredit?parseFloat(form.putCredit):0,
    putCostToClose: '',
    // Call side
    shortCall:  form.shortCall?parseFloat(form.shortCall):null,
    longCall:   form.longCall?parseFloat(form.longCall):null,
    callCredit: form.callCredit?parseFloat(form.callCredit):0,
    callCostToClose: '',
    closedLegs: [],
    notes: '',
  };
  const positions=[...state.positions, pos];
  savePositions(positions);
  setState({positions, showForm:false});
  startPolling();
  pushToGh(positions, state.history, `Open ${pos.ticker} position`);
}

function updateCostToClose(id, side, val){
  const positions=state.positions.map(p=>{
    if(p.id!==id) return p;
    return side==='put' ? {...p, putCostToClose:val} : {...p, callCostToClose:val};
  });
  savePositions(positions);
  state.positions=positions;
  render();
}

function openCloseForm(id, mode){
  setState({editingId:id, closeMode:mode});
}

function confirmClose(){
  const id=state.editingId, mode=state.closeMode;
  const pos=state.positions.find(p=>p.id===id);
  if(!pos) return;

  if(mode==='full'){
    const putDebit  = document.getElementById('cl-put-debit')?.value;
    const callDebit = document.getElementById('cl-call-debit')?.value;
    const notes     = document.getElementById('cl-notes')?.value||'';
    const hasPut=pos.shortPut&&pos.longPut, hasCall=pos.shortCall&&pos.longCall;
    const putPl  = hasPut  && putDebit!==''  ? pos.putCredit  - parseFloat(putDebit)  : null;
    const callPl = hasCall && callDebit!=='' ? pos.callCredit - parseFloat(callDebit) : null;
    // Include any already-closed legs
    const priorPl=(pos.closedLegs||[]).reduce((s,l)=>s+(l.pl||0),0);
    const finalPl=(putPl!==null||callPl!==null) ? priorPl+(putPl||0)+(callPl||0) : null;
    const record={...pos,closedAt:new Date().toISOString(),putDebit:parseFloat(putDebit)||null,callDebit:parseFloat(callDebit)||null,finalPl,notes};
    const history=[record,...state.history];
    const positions=state.positions.filter(p=>p.id!==id);
    savePositions(positions); saveHistory(history);
    setState({positions,history,editingId:null,closeMode:null});
    pushToGh(positions,history,`Close ${pos.ticker} — ${finalPl!==null?fmtM(finalPl):'P/L not recorded'}`);
    return;
  }

  // Partial leg close
  const legDebit=document.getElementById('cl-leg-debit')?.value;
  const legNotes=document.getElementById('cl-leg-notes')?.value||'';
  const legCredit=mode==='put'?pos.putCredit:pos.callCredit;
  const debit=legDebit!==''?parseFloat(legDebit):null;
  const legPl=debit!==null?(legCredit-debit):null;
  const closedLeg={side:mode, strikes:mode==='put'?{short:pos.shortPut,long:pos.longPut}:{short:pos.shortCall,long:pos.longCall}, closedAt:new Date().toISOString(), creditAllocated:legCredit, debitPaid:debit, pl:legPl, notes:legNotes};

  const updated={...pos, closedLegs:[...(pos.closedLegs||[]),closedLeg]};
  if(mode==='put'){ updated.shortPut=null; updated.longPut=null; updated.putCredit=0; updated.putCostToClose=''; }
  else { updated.shortCall=null; updated.longCall=null; updated.callCredit=0; updated.callCostToClose=''; }

  const stillOpen=(updated.shortPut&&updated.longPut)||(updated.shortCall&&updated.longCall);

  if(!stillOpen){
    // Both sides now closed — finalize
    const priorPl=(pos.closedLegs||[]).reduce((s,l)=>s+(l.pl||0),0);
    const finalPl=legPl!==null?(priorPl+legPl):null;
    const record={...pos,closedAt:new Date().toISOString(),finalPl,closedLegs:updated.closedLegs,notes:legNotes};
    const history=[record,...state.history];
    const positions=state.positions.filter(p=>p.id!==id);
    savePositions(positions); saveHistory(history);
    setState({positions,history,editingId:null,closeMode:null});
    pushToGh(positions,history,`Close final leg & ${pos.ticker} position`);
    return;
  }

  const positions=state.positions.map(p=>p.id===id?updated:p);
  savePositions(positions);
  setState({positions,editingId:null,closeMode:null});
  pushToGh(positions,state.history,`Close ${mode} leg of ${pos.ticker}`);
}

function deleteHistory(idx){
  const history=state.history.filter((_,i)=>i!==idx);
  saveHistory(history);
  setState({history});
  pushToGh(state.positions,history,'Delete history entry');
}

function alertDot(level){ return {danger:'var(--red)',action:'var(--green)',warn:'var(--amber)',info:'var(--faint)'}[level]||'var(--faint)'; }
function alertClass(level){ return {danger:'al-danger',action:'al-action',warn:'al-warn',info:'al-info'}[level]||'al-info'; }

function renderAlerts(alerts){
  if(!alerts.length) return `<div class="al-ok"><span style="color:var(--green);font-weight:600;">All clear.</span> No rules triggered — hold as planned.</div>`;
  return alerts.map(a=>`
    <div class="alert ${alertClass(a.level)}">
      <div class="alert-title"><span class="alert-dot" style="background:${alertDot(a.level)}"></span><strong>${esc(a.title)}</strong></div>
      <div class="alert-detail">${esc(a.detail)}</div>
    </div>`).join('');
}

      <div class="sl" style="margin-top:10px;">Already closed this position</div>
      ${pos.closedLegs.map(l=>`<div class="row"><span>${l.side==='put'?'Put':'Call'} spread (${l.strikes.short}/${l.strikes.long})</span><span class="mono" style="color:${l.pl>=0?'var(--green)':'var(--red)'}">${l.pl!==null?fmtM(l.pl):'—'}</span></div>`).join('')}
    `:''}

    <div class="sl" style="margin-top:10px;">Strikes &amp; credits</div>
    ${hasPut?`<div class="row"><span>Short put</span><span class="mono">$${pos.shortPut}</span></div>`:''}
    ${hasPut?`<div class="row"><span>Long put</span><span class="mono">$${pos.longPut}</span></div>`:''}

    ${price&&hasCall?`<div class="row"><span>Distance to short call</span><span class="mono">${(pctDiff(pos.shortCall,price)*100).toFixed(2)}%</span></div>`:''}

            <div class="mono" style="font-size:13px;font-weight:600;">${esc(h.ticker)} ${h.shortPut||''}${h.shortPut&&h.longPut?'/'+h.longPut:''}${h.shortCall?' · '+h.shortCall+'/'+h.longCall:''}</div>
            <div style="font-size:11px;color:var(--faint);">exp ${h.expiration} · ${new Date(h.closedAt).toLocaleDateString()}${h.notes?' · '+esc(h.notes):''}</div>
            ${(h.closedLegs||[]).length?`<div style="font-size:11px;color:var(--dim);">${h.closedLegs.map(l=>`${l.side}: ${l.pl!==null?fmtM(l.pl):'—'}`).join(' | ')}</div>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:9px;">
            <div class="mono" style="font-size:14px;font-weight:700;color:${h.finalPl>=0?'var(--green)':'var(--red)'};">${h.finalPl!==null?fmtM(h.finalPl):'—'}</div>
            <button class="btn btn-ghost btn-sm" onclick="deleteHistory(${i})">✕</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  root.innerHTML=html;
}

// ── form submission ───────────────────────────────────────────────────────
function submitForm(){
  const ticker=document.getElementById('f-ticker').value.trim();
  const expiration=document.getElementById('f-exp').value;
  const contracts=document.getElementById('f-contracts').value;
  const sp=document.getElementById('f-sp').value.trim();
  const lp=document.getElementById('f-lp').value.trim();
  const pc=document.getElementById('f-pc').value.trim();
  const sc=document.getElementById('f-sc').value.trim();
  const lc=document.getElementById('f-lc').value.trim();
  const cc=document.getElementById('f-cc').value.trim();
  const errEl=document.getElementById('f-err');

  if(!ticker||!expiration){errEl.textContent='Ticker and expiration are required.';errEl.style.display='block';return;}
  const hasPut=sp&&lp, hasCall=sc&&lc;
  if(!hasPut&&!hasCall){errEl.textContent='Enter at least one spread (put or call).';errEl.style.display='block';return;}
  if(hasPut&&parseFloat(lp)>=parseFloat(sp)){errEl.textContent='Long put must be below short put.';errEl.style.display='block';return;}
  if(hasCall&&parseFloat(lc)<=parseFloat(sc)){errEl.textContent='Long call must be above short call.';errEl.style.display='block';return;}

  saveNewPosition({ticker,expiration,contracts,shortPut:sp,longPut:lp,putCredit:pc||'0',shortCall:sc,longCall:lc,callCredit:cc||'0'});
}

// ── boot ──────────────────────────────────────────────────────────────────
render();
startPolling();
initialSync();
</script>
